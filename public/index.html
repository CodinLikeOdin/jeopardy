<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeopardy!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Title Screen -->
  <div id="titleScreen">
    <canvas id="particleCanvas"></canvas>
    <div id="titleContent">
      <div id="titleSub">WELCOME TO</div>
      <div id="titleMain">Nolan's<br>Trivia Night</div>
      <div id="titleStars">★ ★ ★</div>
    </div>
    <div id="titleCountdown"></div>
    <div id="spotlightLeft" class="spotlight"></div>
    <div id="spotlightRight" class="spotlight"></div>
  </div>

  <div id="app">
    <!-- Landing -->
    <div id="landing" class="screen">
      <div class="logo">JEOPARDY!</div>
      <div class="card">
        <input id="playerName" type="text" placeholder="Your name" maxlength="20">
        <div id="photoRow">
          <img id="photoPreview" class="hidden" alt="your photo">
          <button class="btn btn-secondary" onclick="document.getElementById('photoInput').click()">📷 Add Your Photo</button>
          <input id="photoInput" type="file" accept="image/*" capture="user" style="display:none" onchange="onPhotoSelected(event)">
        </div>
        <button class="btn btn-primary" onclick="joinAsPlayer()">Join as Player</button>
        <button class="btn btn-secondary" onclick="joinAsHost()">Join as Host</button>
      </div>
    </div>

    <!-- Lobby -->
    <div id="lobby" class="screen hidden">
      <div class="logo">JEOPARDY!</div>
      <div id="lobbyContent"></div>
    </div>

    <!-- Category Setup (host only) -->
    <div id="setup" class="screen hidden">
      <div class="logo">JEOPARDY!</div>
      <div class="setup-columns">
        <div class="card">
          <h2>Single Jeopardy</h2>
          <p class="subtitle">$100 – $500</p>
          <div class="cat-row"><input class="cat-input single-cat" type="text" placeholder="Category 1" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input single-cat" type="text" placeholder="Category 2" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input single-cat" type="text" placeholder="Category 3" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input single-cat" type="text" placeholder="Category 4" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input single-cat" type="text" placeholder="Category 5" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input single-cat" type="text" placeholder="Category 6" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
        </div>
        <div class="card">
          <h2>Double Jeopardy</h2>
          <p class="subtitle">$200 – $1000</p>
          <div class="cat-row"><input class="cat-input double-cat" type="text" placeholder="Category 1" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input double-cat" type="text" placeholder="Category 2" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input double-cat" type="text" placeholder="Category 3" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input double-cat" type="text" placeholder="Category 4" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input double-cat" type="text" placeholder="Category 5" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
          <div class="cat-row"><input class="cat-input double-cat" type="text" placeholder="Category 6" maxlength="30"><button class="btn-reroll" onclick="rerollOne(this)" title="Random topic">⟳</button><button class="btn-reroll btn-add" onclick="addTopicFromRow(this)" title="Save this topic to the pool">➕</button><button class="btn-reroll btn-del" onclick="deleteTopicFromRow(this)" title="Remove this topic from the pool">🗑</button></div>
        </div>
      </div>
      <div class="settings-row">
        <label class="setting">
          <span>Enforce early-buzz penalty</span>
          <input type="checkbox" id="enforcePenalty" checked>
          <span class="switch"></span>
        </label>
        <label class="setting">
          <span>Buzz time limit (seconds)</span>
          <input type="number" id="buzzSeconds" min="2" max="60" value="8" class="num-input">
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-secondary" onclick="rerollAll()">⟳ Randomize All</button>
        <button class="btn btn-primary" onclick="submitCategories()">Generate Questions</button>
      </div>
    </div>

    <!-- Generating -->
    <div id="generating" class="screen hidden">
      <div class="logo">JEOPARDY!</div>
      <div class="card center">
        <div class="spinner"></div>
        <h2>Generating Questions...</h2>
        <p id="genStatus">Claude AI is writing your Jeopardy! clues</p>
      </div>
    </div>

    <!-- Game Board -->
    <div id="game" class="screen hidden">
      <div id="gameHeader">
        <div id="roundLabel"></div>
        <div id="scoreboard"></div>
        <div id="hostControls" class="hidden">
          <button class="btn btn-sm" onclick="advanceRound()">Next Round →</button>
          <button class="btn btn-sm btn-danger" onclick="resetGame()">Reset</button>
        </div>
      </div>
      <div id="board"></div>
    </div>

    <!-- Question Modal -->
    <div id="questionModal" class="modal hidden">
      <div class="modal-content">
        <div id="modalCategory"></div>
        <div id="modalValue"></div>
        <div id="modalClue"></div>
        <div id="dailyDoubleSection" class="hidden">
          <h3>DAILY DOUBLE!</h3>
          <div id="wagerSection"></div>
        </div>
        <div id="judgingPanel" class="hidden"></div>
        <div id="modalAnswer" class="hidden"></div>
        <div id="buzzers"></div>
        <div id="audioStatus" class="hidden" onclick="retryClueAudio()"></div>
        <div id="readingStatus" class="hidden"></div>
        <div id="hostQuestionControls" class="hidden">
          <div id="playerAwardButtons"></div>
        </div>
        <div id="playerBuzzSection">
          <button id="buzzBtn" class="buzz-btn hidden" onclick="buzz()">BUZZ IN</button>
        </div>
      </div>
    </div>

    <!-- Game Over -->
    <div id="gameover" class="screen hidden">
      <div class="logo">JEOPARDY!</div>
      <div class="card center">
        <h2>Final Scores</h2>
        <div id="finalScores"></div>
        <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
